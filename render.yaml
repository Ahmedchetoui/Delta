# Delta Fashion — déploiement Render (backend)
services:
  - type: web
    name: delta-fashion-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_FOLDER
        value: delta-fashion/uploads
