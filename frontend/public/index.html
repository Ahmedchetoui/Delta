    <style>
      #initial-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.3s ease;
      }
      #initial-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #initial-splash .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
    <div id="initial-splash" aria-hidden="true"><div class="spinner"></div></div>
    <div id="root"></div>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        var splash = document.getElementById('initial-splash');
        if (!splash) return;
        var hide = function () {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 350);
        };
        if (document.getElementById('root').childElementCount > 0) hide();
        var observer = new MutationObserver(function () {
          if (document.getElementById('root').childElementCount > 0) {
            hide();
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
